# NAS-Overlay (opt-in) — hängt das Foto-Archiv per SMB/CIFS ein.
#
# Aktivieren in deploy/.env:
#     COMPOSE_FILE=docker-compose.yml:docker-compose.nas.yml
# und NAS_HOST / NAS_PATH / NAS_USER / NAS_PASSWORD setzen. Danach genügt
# weiterhin ein normales `docker compose up -d`.
#
# Ohne dieses Overlay bootet der Stack mit lokalem Volume (kein NAS).
#
# Eingehängt wird //<NAS_HOST>/<NAS_PATH> (z. B. 192.168.0.5 / Fotos/Astrofotos)
# direkt nach /archive, sodass cura-stro isoliert nur dort schreibt.
# uid/gid 1000 = Container-User appuser (Schreibrecht). vers=3.0 für SMB3
# (Synology). Falls der Mount zickt: vers auf 2.1 oder 3.1.1 ändern.
services:
  backend:
    # Erzwingt das Archiv-Volume (überstimmt einen evtl. ARCHIVE_PATH-Bind).
    volumes:
      - archivedata:/archive

volumes:
  archivedata:
    driver: local
    driver_opts:
      type: cifs
      device: "//${NAS_HOST}/${NAS_PATH}"
      o: "username=${NAS_USER},password=${NAS_PASSWORD},uid=1000,gid=1000,vers=3.0,file_mode=0775,dir_mode=0775"
