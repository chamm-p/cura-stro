# cura-stro — Astrofotografie-App
# Multi-Arch (amd64 + arm64): alle Base-Images sind multi-arch.
#
#   cp .env.example .env   # dann anpassen
#   docker compose up -d --build

# Projekt-/Gruppenname (sonst = Ordnername "deploy").
name: curastro

services:
  db:
    image: postgres:16-alpine
    container_name: curastro-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-curastro}
      POSTGRES_USER: ${POSTGRES_USER:-curastro}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?required}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks: [curastro-net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-curastro}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    image: curastro-backend:dev
    container_name: curastro-backend
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-curastro}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-curastro}
      SEEING_SCRAPER_URL: http://weather-scraper:8090
      ARCHIVE_ROOT: ${ARCHIVE_ROOT:-/archive}
    ports:
      - "${BACKEND_PORT:-9605}:8000"
    volumes:
      - outputs:/app/outputs
      # Foto-Archiv (RAW/Developer) unter /archive. Default: Ordner ./archive
      # im Repo-Root (entsteht beim git pull, im Finder/Host sichtbar). Per
      # ARCHIVE_PATH in .env auf einen anderen Host-Pfad umbiegbar. Im
      # Regelbetrieb wird ohnehin der NAS per SMB aus der App angesprochen
      # (Einstellungen → Archiv & ASIAir) — dann ist /archive nur Fallback.
      - ${ARCHIVE_PATH:-../archive}:/archive
    # Mac-Agent (PixInsight) erreichbar machen: der Container muss den Mac
    # im LAN erreichen können. extra_hosts legt einen DNS-Eintrag im
    # Container an, der auf die Host-IP des Mac zeigt. Setze in .env:
    #   MAC_AGENT_IP=192.168.1.100   (IP deines Mac)
    # Dann ist im Container 'mac-agent' auflösbar und PIXINSIGHT_AGENT_URL
    # kann auf http://mac-agent:7777 gesetzt werden.
    extra_hosts:
      - "mac-agent:${MAC_AGENT_IP:-host-gateway}"
    depends_on:
      db: { condition: service_healthy }
    networks: [curastro-net]

  weather-scraper:
    build:
      context: ../weather-scraper
      dockerfile: Dockerfile
    image: curastro-weather-scraper:dev
    container_name: curastro-weather-scraper
    restart: unless-stopped
    networks: [curastro-net]
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8090/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile.prod
      args:
        VITE_API_URL: ""
    image: curastro-frontend:dev
    container_name: curastro-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-9601}:80"
    depends_on:
      - backend
    networks: [curastro-net]

volumes:
  # name: auf die bisherigen Volumes gepinnt, damit die Projekt-Umbenennung
  # (deploy → curastro) KEINE Daten verliert (DB bleibt erhalten).
  pgdata:
    name: deploy_pgdata
  outputs:
    name: deploy_outputs
  # (Foto-Archiv ist jetzt ein Bind-Mount auf ./archive, kein Volume mehr.)

networks:
  curastro-net:
    driver: bridge
