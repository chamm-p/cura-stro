# cura-stro — Astrofotografie-App
# Multi-Arch (amd64 + arm64): alle Base-Images sind multi-arch.
#
#   cp .env.example .env   # dann anpassen
#   docker compose up -d --build

services:
  db:
    image: postgres:16-alpine
    container_name: curastro-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-curastro}
      POSTGRES_USER: ${POSTGRES_USER:-curastro}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?required}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks: [curastro-net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-curastro}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    image: curastro-backend:dev
    container_name: curastro-backend
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-curastro}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-curastro}
      SEEING_SCRAPER_URL: http://weather-scraper:8090
      ARCHIVE_ROOT: ${ARCHIVE_ROOT:-/archive}
    ports:
      - "${BACKEND_PORT:-9605}:8000"
    volumes:
      - outputs:/app/outputs
      # Foto-Archiv (RAW/Developer) unter /archive. Standard: CIFS-Volume
      # archivedata (NAS, Zugangsdaten via NAS_* in .env). Alternativ einen
      # Host-Pfad als Bind erzwingen mit ARCHIVE_PATH=/mnt/...
      - ${ARCHIVE_PATH:-archivedata}:/archive
    depends_on:
      db: { condition: service_healthy }
    networks: [curastro-net]

  weather-scraper:
    build:
      context: ../weather-scraper
      dockerfile: Dockerfile
    image: curastro-weather-scraper:dev
    container_name: curastro-weather-scraper
    restart: unless-stopped
    networks: [curastro-net]
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8090/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile.prod
      args:
        VITE_API_URL: ""
    image: curastro-frontend:dev
    container_name: curastro-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-9601}:80"
    depends_on:
      - backend
    networks: [curastro-net]

volumes:
  pgdata:
  outputs:
  # NAS-Foto-Archiv per SMB/CIFS. Greift nur, wenn ARCHIVE_PATH NICHT gesetzt
  # ist (sonst Bind). Zugangsdaten + Pfad kommen aus deploy/.env (NAS_*).
  # Eingehängt wird direkt //<NAS_HOST>/<NAS_PATH> (z. B. Fotos/Astrofotos),
  # sodass /archive isoliert auf den Astrofoto-Ordner zeigt. uid/gid 1000 =
  # Container-User appuser (Schreibrecht). vers=3.0 für Synology/SMB3.
  archivedata:
    driver: local
    driver_opts:
      type: cifs
      device: "//${NAS_HOST:-}/${NAS_PATH:-}"
      o: "username=${NAS_USER:-},password=${NAS_PASSWORD:-},uid=1000,gid=1000,vers=3.0,file_mode=0775,dir_mode=0775"

networks:
  curastro-net:
    driver: bridge
