server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    types {
        text/javascript            js mjs;
        text/css                   css;
        text/html                  html htm;
        application/json           json;
        application/wasm           wasm;
        image/svg+xml              svg;
        image/png                  png;
        image/jpeg                 jpg jpeg;
        image/gif                  gif;
        image/webp                 webp;
        image/x-icon               ico;
        video/mp4                  mp4;
        font/woff                  woff;
        font/woff2                 woff2;
    }
    default_type application/octet-stream;

    # API ans Backend (gleiche Origin → kein CORS).
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 512M;   # große FITS/XISF-Uploads (Phase 6)
        proxy_read_timeout 300s;
    }

    # MCP-Server (Streamable HTTP / SSE) für externe LLMs (curai).
    location /mcp {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_buffering off;            # SSE: nicht puffern
        proxy_cache off;
        proxy_read_timeout 3600s;
        chunked_transfer_encoding on;
    }

    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        expires off;
    }
    location / {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        expires off;
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|mjs|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|wasm|mp4)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1024;
}
